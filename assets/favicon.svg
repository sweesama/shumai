<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景：米白纸面，与页面 --bg 协调 -->
  <rect width="100" height="100" rx="18" fill="#eae7e0"/>
  <!-- 朱砂印章红主色 -->
  <g fill="#a33232">
    <!-- "书脉"的极简符号化：一卷竖立的书卷 + 脉搏波 -->
    <!-- 书卷主体 -->
    <rect x="32" y="24" width="10" height="52" rx="2"/>
    <!-- 书卷顶部弧线（卷起感）-->
    <path d="M32 24 Q37 18 42 24 L42 30 L32 30 Z"/>
    <!-- 书脊细节 -->
    <rect x="34" y="32" width="6" height="1.6" fill="#eae7e0" opacity="0.8"/>
    <rect x="34" y="40" width="6" height="1.6" fill="#eae7e0" opacity="0.8"/>
    <rect x="34" y="48" width="6" height="1.6" fill="#eae7e0" opacity="0.8"/>
    <!-- 脉搏波（书脉的"脉"）-->
    <path d="M50 58 L58 58 L62 40 L68 72 L72 52 L78 52" stroke="#a33232" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
